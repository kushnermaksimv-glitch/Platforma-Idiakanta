<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Cosmic Cat Python Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #04020d; font-family: 'Courier New', monospace; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #jump-btn {
            position: absolute; bottom: 25px; right: 35px; width: 85px; height: 85px;
            background: rgba(0, 255, 204, 0.15); border: 4px dashed #00ffcc; border-radius: 50%;
            color: #00ffcc; font-size: 26px; text-align: center; line-height: 77px; z-index: 10;
        }
        #jump-btn:active { background: rgba(0, 255, 204, 0.5); color: #fff; }

        #ui-layer {
            position: absolute; top: 15px; left: 15px; color: #fff; font-size: 12px; font-weight: bold;
            background: rgba(10, 10, 26, 0.85); padding: 12px; border-radius: 6px; border: 2px solid #3d2b55;
            pointer-events: none; min-width: 220px; z-index: 20;
        }

        #status-screen {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #060613; color: #00ffcc; text-align: center;
            justify-content: center; align-items: center; flex-direction: column; z-index: 9999; padding: 20px;
        }

        #rotate-message {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; color: #ff00ff; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 9998;
        }
        @media (orientation: portrait) { #rotate-message { display: flex; } }
    </style>
</head>
<body>

    <div id="rotate-message">
        <h2>🔄 ПЕРЕВЕРНИ ТЕЛЕФОН</h2>
        <p style="color: #fff; margin-top: 8px;">Переверни устройство боком для старта миссии!</p>
    </div>

    <div id="status-screen">
        <h2 id="status-title" style="text-shadow: 0 0 10px #00ffcc;">ПОДКЛЮЧЕНИЕ К PYTHON-СЕРВЕРУ...</h2>
        <p id="status-text" style="color: #fff; margin-top: 15px; font-size: 13px; background: #111; padding: 12px; border-radius: 6px; border: 1px solid #333;">Синхронизация с сервером на Render. Первая загрузка «спящего» сервера может занять около 30 секунд...</p>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div>ЛОКАЦИЯ: <span id="game-mode" style="color:#ff00ff;">Загрузка...</span></div>
            <div style="margin-top: 8px; color: #a0aec0;">🌍 КОТЫ В СЕТИ:</div>
            <div id="ranks" style="margin-top: 4px; color: #00ffcc; line-height: 1.4;">Поиск игроков...</div>
        </div>
        <div id="jump-btn">▲</div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const modeDisplay = document.getElementById('game-mode');
const ranksDisplay = document.getElementById('ranks');
const jumpBtn = document.getElementById('jump-btn');
const statusScreen = document.getElementById('status-screen');
const statusTitle = document.getElementById('status-title');
const statusText = document.getElementById('status-text');

ctx.imageSmoothingEnabled = false;

// ТЕКСТУРЫ (Оставь пустыми для встроенного пиксель-арта)
const TEXTURES_CONFIG = { cat: '', platform: '', crystal: '' };
const textures = {};
let loadedImages = 0, totalImages = 0, useSprites = false;

for (let key in TEXTURES_CONFIG) {
    if (TEXTURES_CONFIG[key].trim() !== '') {
        totalImages++;
        textures[key] = new Image(); textures[key].src = TEXTURES_CONFIG[key];
        textures[key].onload = () => { loadedImages++; if (loadedImages === totalImages) useSprites = true; };
    }
}

// Подключаемся напрямую к твоему веб-сервису на Render
const socket = io('https://platforma-idiakanta.onrender.com', {
    timeout: 30000,
    reconnectionAttempts: 6
}); 

socket.on('connect', () => { statusScreen.style.display = 'none'; });
socket.on('connect_error', (err) => {
    statusTitle.innerText = "⚠️ СЕТЕВАЯ ОШИБКА"; statusTitle.style.color = "#ff3333";
    statusText.innerText = "Не удалось подключиться к Python-серверу на Render.\nПроверь вкладку «Logs» в личном кабинете хостинга.\n\nКод: " + err.message;
});

const gravity = 0.45;
let platforms = [], crystals = [], cameraX = 0, gameMode = "LOBBY", frame = 0;
let me = { x: 100, y: 100, w: 36, h: 42, vx: 0, vy: 0, dir: 1, grounded: false, score: 0, name: "Ты 😎" };
let opponents = {}, keys = { left: false, right: false, jump: false };

window.addEventListener('pointerdown', (e) => {
    if (e.target === jumpBtn) keys.jump = true;
    else { if (e.clientX < window.innerWidth / 2) keys.left = true; else keys.right = true; }
});
window.addEventListener('pointerup', (e) => {
    if (e.target === jumpBtn) keys.jump = false; else { keys.left = false; keys.right = false; }
});

socket.on('currentPlayers', (serverPlayers) => {
    Object.keys(serverPlayers).forEach((id) => { if (id !== socket.id) opponents[id] = serverPlayers[id]; });
});
socket.on('newPlayer', (data) => { opponents[data.id] = data.info; });
socket.on('playerMoved', (data) => { if (opponents[data.id]) opponents[data.id] = data.info; });
socket.on('playerDisconnected', (id) => { delete opponents[id]; });

function drawStandardPlatform(x, y, w, h) {
    ctx.fillStyle = '#1e1233'; ctx.fillRect(x, y, w, h);
    let size = 8; ctx.fillStyle = '#2d1b4d';
    for (let bx = 0; bx < w; bx += size) {
        for (let by = 0; by < h; by += size) { if ((bx + by) % 32 === 0) ctx.fillRect(x + bx, y + by, size, size); }
    }
    ctx.fillStyle = "#ff00bb"; ctx.fillRect(x, y, w, 4);
}

function initLobby() {
    gameMode = "LOBBY"; modeDisplay.innerText = "ПИТОН ЛОББИ";
    let floorY = canvas.height * 0.8;
    platforms = [ { x: 0, y: floorY, w: 1000 }, { x: 350, y: floorY - 90, w: 220 } ];
    crystals = [];
}

function initMatch() {
    gameMode = "MATCH"; modeDisplay.innerText = "БЕЗДНА PYTHON";
    let floorY = canvas.height * 0.75;
    platforms = [ { x: 0, y: floorY, w: 400 }, { x: 520, y: floorY - 90, w: 250 }, { x: 900, y: floorY - 180, w: 350 } ];
    crystals = [{ x: 640, y: floorY - 130, active: true }, { x: 1050, y: floorY - 220, active: true }];
}

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if(gameMode === "LOBBY") initLobby(); else initMatch();
}
window.addEventListener('resize', resize); resize();

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); frame++;
    ctx.fillStyle = "#04020d"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (keys.left) { me.vx = -4.5; me.dir = -1; } else if (keys.right) { me.vx = 4.5; me.dir = 1; } else me.vx = 0;
    if (keys.jump && me.grounded) { me.vy = -11.5; me.grounded = false; keys.jump = false; }
    me.vy += gravity; me.x += me.vx; me.y += me.vy; me.grounded = false;

    platforms.forEach(plat => {
        if (me.x + me.w > plat.x && me.x < plat.x + plat.w && me.y + me.h > plat.y && me.y + me.h - me.vy <= plat.y + 12) {
            me.y = plat.y - me.h; me.vy = 0; me.grounded = true;
        }
    });
    if (me.y > canvas.height + 120) { me.x = 100; me.y = 100; me.vy = 0; }

    if (socket.connected) {
        socket.emit('playerMovement', { x: me.x, y: me.y, dir: me.dir, gameMode: gameMode, score: me.score });
    }

    cameraX = me.x - canvas.width / 3; if (cameraX < 0) cameraX = 0;
    if (gameMode === "LOBBY" && me.x > 820) { initMatch(); return; }

    platforms.forEach(plat => {
        if (useSprites && textures.platform) ctx.drawImage(textures.platform, plat.x - cameraX, plat.y, plat.w, 40);
        else drawStandardPlatform(plat.x - cameraX, plat.y, plat.w, 40);
    });

    crystals.forEach(cry => {
        if (!cry.active) return;
        if (useSprites && textures.crystal) ctx.drawImage(textures.crystal, cry.x - cameraX, cry.y + Math.sin(frame * 0.1) * 3, 20, 20);
        else { ctx.fillStyle = "#00ffcc"; ctx.fillRect(cry.x - cameraX, cry.y + Math.sin(frame * 0.1) * 3, 16, 16); }
        if (Math.abs(me.x - cry.x) < 32 && Math.abs(me.y - cry.y) < 32) { cry.active = false; me.score += 100; setTimeout(() => cry.active = true, 3000); }
    });

    // Отрисовка игрока (Тебя)
    ctx.save(); ctx.translate(me.x - cameraX, me.y);
    if (useSprites && textures.cat) ctx.drawImage(textures.cat, 0, 0, me.w, me.h);
    else { ctx.fillStyle = "#e67e22"; ctx.fillRect(0, 0, me.w, me.h); ctx.fillStyle = "#000"; ctx.fillRect(me.dir === 1 ? 16 : 2, 8, 18, 6); }
    ctx.fillStyle = "#fff"; ctx.font = "bold 11px monospace"; ctx.fillText(me.name, me.w/2 - 10, -10); ctx.restore();

    // Отрисовка других игроков онлайн
    let scoreboard = `• Ты: <span style="color:#fff;">${me.score} XP</span><br>`;
    Object.keys(opponents).forEach((id) => {
        let p = opponents[id];
        if (p.gameMode === gameMode) { 
            scoreboard += `• ${p.name}: <span style="color:#fff;">${p.score} XP</span><br>`;
            ctx.save(); ctx.translate(p.x - cameraX, p.y);
            if (useSprites && textures.cat) ctx.drawImage(textures.cat, 0, 0, me.w, me.h);
            else { ctx.fillStyle = "#8e44ad"; ctx.fillRect(0, 0, me.w, me.h); ctx.fillStyle = "#000"; ctx.fillRect(p.dir === 1 ? 16 : 2, 8, 18, 6); }
            ctx.fillStyle = "#ff00ff"; ctx.font = "10px monospace"; ctx.fillText(p.name, 0, -10); ctx.restore();
        }
    });
    ranksDisplay.innerHTML = scoreboard;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
